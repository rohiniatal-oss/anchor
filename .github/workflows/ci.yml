name: CI

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run check

      - name: Unit tests
        if: always()
        run: |
          set +e
          npm test > /tmp/anchor-tests.log 2>&1
          status=$?
          tail -n 260 /tmp/anchor-tests.log
          exit $status

      - name: CSS source audit
        if: always()
        run: npm run audit:css-sources

      - name: Production build
        if: always()
        run: npm run build
