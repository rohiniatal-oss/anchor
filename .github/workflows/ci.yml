name: CI

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: |
          set -o pipefail
          npm run check 2>&1 | tee /tmp/anchor-typecheck.log

      - name: Development plan model tests
        if: always()
        run: npx tsx --test server/trackResearchDevelopmentPlan.test.ts

      - name: Development plan guardrail tests
        if: always()
        run: npx tsx --test server/trackResearchDevelopmentGuardrails.test.ts

      - name: Development plan fingerprint tests
        if: always()
        run: npx tsx --test server/trackResearchDevelopmentFingerprint.test.ts

      - name: Development plan presentation tests
        if: always()
        run: npx tsx --test server/trackResearchDevelopmentPresentation.test.ts

      - name: Development plan synthesis boundary tests
        if: always()
        run: npx tsx --test server/trackResearchDevelopmentSynthesis.test.ts

      - name: Full unit test suite
        if: always()
        run: |
          set +e
          npm test > /tmp/anchor-tests.log 2>&1
          status=$?
          tail -n 120 /tmp/anchor-tests.log
          exit $status

      - name: CSS source audit
        if: always()
        run: npm run audit:css-sources

      - name: Production build
        if: always()
        run: npm run build

      - name: Upload failure diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-diagnostics-${{ github.run_attempt }}
          if-no-files-found: ignore
          retention-days: 3
          path: |
            /tmp/anchor-typecheck.log
            /tmp/anchor-tests.log
