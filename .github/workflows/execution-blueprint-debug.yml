name: Execution blueprint typecheck diagnostics

on:
  pull_request:
    paths:
      - "server/trackResearchExecution*.ts"
      - "client/src/components/home/TrackExecutionBlueprint.tsx"
      - ".github/workflows/execution-blueprint-debug.yml"

permissions:
  contents: write

jobs:
  typecheck-diagnostics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          show-progress: false
      - name: Capture TypeScript errors
        shell: bash
        run: |
          npm ci --silent
          set +e
          npm run check -- --pretty false > typecheck-errors.txt 2>&1
          status=$?
          cat typecheck-errors.txt
          if [ "$status" -ne 0 ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add typecheck-errors.txt
            git commit -m "Capture execution blueprint typecheck errors"
            git push origin HEAD:${{ github.head_ref }}
          fi
          exit $status
