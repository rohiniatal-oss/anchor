name: Part3 Debug

on:
  push:
    branches:
      - codex/requirement-driven-development-plan
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Capture verification output
        shell: bash
        run: |
          set +e
          npm run verify > part3-verify.log 2>&1
          code=$?
          printf '%s\n' "$code" > part3-exit-code.txt
          exit 0

      - name: Upload verification log
        uses: actions/upload-artifact@v4
        with:
          name: part3-debug
          path: |
            part3-verify.log
            part3-exit-code.txt
          if-no-files-found: error
