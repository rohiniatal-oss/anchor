// ─── Storage helpers ──────────────────────────────────────────────────────────
function loadLS(key) { try { return JSON.parse(localStorage.getItem(key) || 'null'); } catch { return null; } }
function saveLS(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} }

function nextId(items) { return items.length === 0 ? 1 : Math.max(...items.map(x => x.id)) + 1; }

// ─── Data hooks ───────────────────────────────────────────────────────────────
function useData(key) {
  const [data, setData] = useState(() => loadLS(key) || []);
  const refresh = useCallback(() => setData(loadLS(key) || []), [key]);
  const save = useCallback((items) => { saveLS(key, items); setData(items); }, [key]);
  return [data, save, refresh];
}

// ─── Utility functions ────────────────────────────────────────────────────────
function daysUntil(d) {
  if (!d) return null;
  const due = new Date(d + 'T00:00:00');
  if (isNaN(due.getTime())) return null;
  const now = new Date(); now.setHours(0,0,0,0);
  return Math.round((due.getTime() - now.getTime()) / 86400000);
}
function formatDeadline(d) {
  const diff = daysUntil(d);
  if (diff === null) return d || '';
  if (diff < 0) return `${Math.abs(diff)}d overdue`;
  if (diff === 0) return 'today';
  if (diff === 1) return 'tomorrow';
  const due = new Date(d + 'T00:00:00');
  if (diff < 7) return due.toLocaleDateString(undefined, { weekday: 'short' });
  return due.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
}
function deadlineTone(d) {
  const diff = daysUntil(d);
  if (diff === null) return 'bg-muted text-muted-foreground';
  if (diff <= 2) return 'bg-red-100 text-red-700';
  if (diff <= 7) return 'bg-blue-100 text-blue-700';
  return 'bg-muted text-muted-foreground';
}
function parseStepsJSON(raw) {
  try { const s = JSON.parse(raw || '[]'); return Array.isArray(s) ? s : []; } catch { return []; }
}
function todayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

// ─── Deterministic planning helpers (ported from planningFeedback.ts) ─────────
function deterministicUnstickStep(task) {
  if (task.readiness === 'blocked' || task.blockerReason) {
    return `Write down the missing input: ${task.blockerReason || 'what is blocking this'}`;
  }
  if (task.sourceUrl) return 'Open the saved link and list what is needed';
  if (task.size === 'deep') return 'Open a blank note and write the first ugly sentence';
  if (/email|message|reach|follow/i.test(task.title)) return 'Draft the first line only';
  return 'Set a two-minute timer and do the smallest visible start';
}

function buildDayPlan(tasks) {
  const today = tasks.filter(t => t.list === 'today' && !t.done);
  const blocked = today.filter(t => t.readiness === 'blocked' || t.blockerReason).slice(0, 2);
  const skipped2 = today.filter(t => (t.skipped || 0) >= 2 && !blocked.includes(t));
  const rest = today.filter(t => !blocked.includes(t) && !skipped2.includes(t));

  const plan = [];
  for (const t of blocked) {
    plan.push({ taskId: t.id, title: `Unblock: ${t.title}`, why: `Blocked — remove the blocker first: ${t.blockerReason || 'unknown'}`, slot: 'now' });
  }
  for (const t of skipped2) {
    plan.push({ taskId: t.id, title: `Shrink or decide: ${t.title}`, why: `This has slipped ${t.skipped} times. Shrink it, park it, or do a 5-min start.`, slot: plan.length === 0 ? 'now' : 'next' });
  }
  for (const t of rest) {
    const slot = plan.length === 0 ? 'now' : plan.length === 1 ? 'next' : plan.length === 2 ? 'later' : 'bonus';
    plan.push({ taskId: t.id, title: t.title, why: t.size === 'deep' ? 'Deep work — start with the first tiny step.' : `On your list for today.`, slot });
  }
  return plan.slice(0, 4);
}

// ─── Brain dump sort heuristics ───────────────────────────────────────────────
function heuristicSort(title) {
  const t = title.toLowerCase();
  if (/apply|interview|job|cv|cover letter|application|role|company|linkedin/.test(t)) return { route: 'job', label: 'File under Jobs', reason: 'Looks like a job-search task.' };
  if (/learn|read|course|study|book|article|research|understand|ai|policy|governance/.test(t)) return { route: 'learn', label: 'File under Learn', reason: 'Looks like a learning item.' };
  if (/reach out|contact|email|message|call|network|meet|talk to|introduce/.test(t)) return { route: 'network', label: 'File under Network', reason: 'Looks like a networking action.' };
  if (/today|urgent|deadline|asap|now|finish|complete/.test(t)) return { route: 'today', label: 'Do today', reason: 'Seems time-sensitive.' };
  return { route: 'keep', label: 'Keep here', reason: 'Not sure — you decide.' };
}

function Btn({ onClick, children, variant = 'default', size = 'md', className = '', disabled = false, type = 'button' }) {

// ─── TODAY VIEW ───────────────────────────────────────────────────────────────
function RightNow({ task, onUpdate, onRemovePin }) {
  const steps = parseStepsJSON(task.steps);
  const currentIdx = steps.findIndex(s => !s.done);
  const current = currentIdx >= 0 ? steps[currentIdx] : null;
  const allDone = steps.length > 0 && currentIdx === -1;
  const avoided = (task.skipped || 0) >= 2;

  function checkStep() {
    if (currentIdx < 0) return;
    const next = steps.map((s, i) => i === currentIdx ? { ...s, done: true } : s);
    onUpdate({ steps: JSON.stringify(next) });
  }

  function unstick() {
    const stepText = deterministicUnstickStep(task);
    const existing = parseStepsJSON(task.steps);
    const deduped = existing.filter(s => s.text.toLowerCase() !== stepText.toLowerCase());
    const updated = JSON.stringify([{ text: stepText, done: false }, ...deduped]);
    onUpdate({ steps: updated });
  }

  function finishTask() {
    onUpdate({ done: true, status: 'done', pinned: false, list: 'today' });
    // auto-log win
    const wins = loadLS(WINS_KEY) || [];
    wins.unshift({ id: nextId(wins), text: task.title, winCategory: 'admin', createdAt: Date.now() });
    saveLS(WINS_KEY, wins);
  }

  function park() { onUpdate({ pinned: false, list: 'inbox', skipped: (task.skipped || 0) + 1 }); }
  function skip() { onUpdate({ pinned: false, skipped: (task.skipped || 0) + 1 }); }
  function markBlocked() { onUpdate({ pinned: false, readiness: 'blocked', blockerReason: 'Marked blocked from Today' }); }
  function moveLater() { onUpdate({ pinned: false }); }

  return (
    <div className="mb-6 rounded-2xl border border-blue-200 bg-blue-50/50 p-5">
      <div className="flex items-center gap-2 text-xs font-semibold uppercase tracking-wide text-blue-600 mb-2">
        <Pin className="w-4 h-4" fill="currentColor" /> Right now
      </div>
      <p className="font-semibold text-lg leading-snug mb-1">{task.title}</p>
      <div className="flex flex-wrap items-center gap-x-3 gap-y-1 mb-2">
        {task.deadline && <span className={`text-xs font-medium px-1.5 py-0.5 rounded-full ${deadlineTone(task.deadline)}`}>{formatDeadline(task.deadline)}</span>}
        {task.doneWhen && <span className="text-xs text-slate-500 inline-flex items-center gap-1"><Check className="w-3 h-3" /> Done when: {task.doneWhen}</span>}
        {task.sourceUrl && <a href={task.sourceUrl} target="_blank" rel="noreferrer" className="text-xs text-blue-600 hover:underline inline-flex items-center gap-1"><ExternalLink className="w-3 h-3" /> Open link</a>}
      </div>
      {avoided && (
        <p className="text-xs rounded-lg bg-slate-100 text-slate-600 px-3 py-2 mb-2">
          This one's been slipping a few days — totally normal. Want it smaller, or park it kindly?
        </p>
      )}

      {steps.length === 0 && (
        <div className="mt-2 space-y-2">
          <p className="text-sm text-slate-500">No steps yet — mark done when ready, or add a tiny first step.</p>
          <div className="flex gap-2">
            <Btn size="sm" variant="outline" onClick={unstick}><Wand2 className="w-3.5 h-3.5" /> Get a tiny first step</Btn>
            <Btn size="sm" variant="outline" onClick={finishTask}><Check className="w-3.5 h-3.5" /> Just mark it done</Btn>
          </div>
        </div>
      )}

      {current && (
        <div className="mt-3">
          {steps.length > 1 && (
            <div className="flex items-center gap-1.5 mb-2.5">
              {steps.map((s, idx) => (
                <span key={idx} className={`h-1.5 rounded-full transition-all ${s.done ? 'flex-1 bg-blue-600' : idx === currentIdx ? 'flex-1 bg-blue-300' : 'w-3 bg-slate-200'}`} />
              ))}
              <span className="ml-1 text-xs text-slate-500 tabular-nums shrink-0">{steps.filter(s => s.done).length}/{steps.length}</span>
            </div>
          )}
          <div className="flex items-start gap-3 rounded-xl bg-white border-2 border-blue-200 p-3.5 cursor-pointer hover:border-blue-400 transition-colors" onClick={checkStep}>
            <button onClick={e => { e.stopPropagation(); checkStep(); }} className="mt-0.5 w-5 h-5 shrink-0 rounded-md border-2 border-blue-500 grid place-items-center hover:bg-blue-500 hover:text-white transition-colors">
              <Check className="w-3 h-3 opacity-0 group-hover:opacity-100" />
            </button>
            <div className="flex-1 min-w-0">
              <span className="font-medium leading-snug">{current.text}</span>
              {steps.length > 1 && <p className="text-xs text-slate-500 mt-1">Tap to mark done — next step will appear</p>}
            </div>
          </div>
          <button onClick={unstick} className="mt-2 inline-flex items-center gap-1.5 text-xs text-slate-500 hover:text-blue-600">
            <Wand2 className="w-3.5 h-3.5" /> Stuck? Get a tiny first step
          </button>
        </div>
      )}

      {allDone && (
        <div className="mt-3 rounded-xl bg-blue-50 border border-blue-200 p-3.5 flex items-center gap-3">
          <div className="flex-1">
            <p className="text-sm font-semibold text-blue-600">All steps done</p>
            <p className="text-xs text-slate-500 mt-0.5">Finish it off and log the win.</p>
          </div>
          <Btn size="sm" onClick={finishTask}><Check className="w-4 h-4" /> Done</Btn>
        </div>
      )}

      <div className="mt-4 pt-3 border-t border-blue-100 flex flex-wrap items-center gap-x-4 gap-y-2">
        <span className="text-xs text-slate-500">Not feeling it?</span>
        <button onClick={unstick} className="text-xs text-slate-500 hover:text-blue-600 inline-flex items-center gap-1"><Wand2 className="w-3.5 h-3.5" /> Make it smaller</button>
        <button onClick={moveLater} className="text-xs text-slate-500 hover:text-blue-600 inline-flex items-center gap-1"><MoveRight className="w-3.5 h-3.5" /> Move to later</button>
        <button onClick={park} className="text-xs text-slate-500 hover:text-blue-600 inline-flex items-center gap-1"><MoonStar className="w-3.5 h-3.5" /> Park for another day</button>
        <button onClick={markBlocked} className="text-xs text-slate-500 hover:text-blue-600 inline-flex items-center gap-1"><X className="w-3.5 h-3.5" /> I'm blocked</button>
      </div>
    </div>
  );
}

function TodayView({ onOpenTab }) {
  const [tasks, setTasks] = useData(TASKS_KEY);
  const [quickText, setQuickText] = useState('');
  const [showToast, setShowToast] = useState('');

  const toast = (msg) => { setShowToast(msg); setTimeout(() => setShowToast(''), 2500); };

  const today = tasks.filter(t => t.list === 'today' && !t.done);
  const doneToday = tasks.filter(t => t.list === 'today' && t.done);
  const pinned = today.find(t => t.pinned);
  const plan = buildDayPlan(tasks);

  function updateTask(id, patch) {
    const updated = tasks.map(t => t.id === id ? { ...t, ...patch } : t);
    setTasks(updated);
  }

  function quickCapture() {
    const text = quickText.trim();
    if (!text) return;
    setQuickText('');
    const newTask = { id: nextId(tasks), title: text, list: 'inbox', done: false, pinned: false, steps: '[]', skipped: 0, createdAt: Date.now() };
    setTasks([...tasks, newTask]);
    toast('Captured — in your brain dump to sort later.');
  }

  function startPlanItem(item) {
    const task = tasks.find(t => t.id === item.taskId);
    if (task) {
      // Add a tiny step if it's a deep task with no steps
      let stepsPatch = {};
      if (task.size === 'deep' && parseStepsJSON(task.steps).length === 0) {
        const stepText = deterministicUnstickStep(task);
        stepsPatch = { steps: JSON.stringify([{ text: stepText, done: false }]) };
      }
      updateTask(task.id, { pinned: true, ...stepsPatch });
    }
  }

  function promoteToWin(task) {
    const wins = loadLS(WINS_KEY) || [];
    const cat = task.category === 'job' ? 'job_progress' : task.category === 'learning' ? 'learning' : 'admin';
    wins.unshift({ id: nextId(wins), text: task.title, winCategory: cat, createdAt: Date.now() });
    saveLS(WINS_KEY, wins);
    toast('Logged as a win!');
  }

  const greeting = (() => { const h = new Date().getHours(); return h < 12 ? 'Morning' : h < 18 ? 'Afternoon' : 'Evening'; })();

  return (
    <div>
      {showToast && (
        <div className="fixed top-4 left-1/2 -translate-x-1/2 z-50 bg-slate-800 text-white text-sm px-4 py-2 rounded-lg shadow-lg">{showToast}</div>
      )}
      <h1 className="text-xl font-bold tracking-tight">{greeting}, Rohini</h1>
      <p className="text-sm text-slate-500 mt-1 mb-4">Here's your day. Start at the top — you don't have to decide.</p>

      <div className="mb-5 flex gap-2">
        <Input value={quickText} onChange={e => setQuickText(e.target.value)} onKeyDown={e => { if (e.key === 'Enter') quickCapture(); }} placeholder="Add anything on your mind…" />
        <Btn variant="outline" onClick={quickCapture}><Plus className="w-4 h-4" /> Capture</Btn>
      </div>

      {pinned ? (
        <RightNow task={pinned} onUpdate={(patch) => updateTask(pinned.id, patch)} onRemovePin={() => updateTask(pinned.id, { pinned: false })} />
      ) : (
        <div className="mb-6">
          {plan.length > 0 ? (
            <div className="rounded-2xl border border-blue-200 bg-blue-50/50 p-5">
              <div className="flex items-center gap-2 text-xs font-semibold uppercase tracking-wide text-blue-600 mb-3">
                <Target className="w-4 h-4" /> Today, in order
              </div>
              <div className="space-y-2">
                {plan.map((item, i) => {
                  const task = tasks.find(t => t.id === item.taskId);
                  const slotColors = ['bg-blue-600 text-white', 'bg-blue-100 text-blue-700', 'bg-slate-100 text-slate-600', 'bg-slate-50 text-slate-500'];
                  const slotLabels = { now: 'Now', next: 'Next', later: 'Later', bonus: 'Bonus' };
                  return (
                    <button key={item.taskId} onClick={() => startPlanItem(item)}
                      className="group w-full text-left flex items-start gap-3 rounded-xl bg-white border border-slate-200 p-3.5 hover:border-blue-300 hover:shadow-sm transition-all">
                      <span className={`shrink-0 mt-0.5 rounded-md text-xs font-semibold px-2 py-1 ${slotColors[i] || slotColors[3]}`}>{slotLabels[item.slot] || item.slot}</span>
                      <div className="flex-1 min-w-0">
                        <p className="text-sm font-medium leading-snug">{item.title}</p>
                        {item.why && <p className="text-xs text-slate-500 mt-0.5 leading-snug">{item.why}</p>}
                        {task?.deadline && <span className={`mt-1 inline-flex items-center gap-1 rounded-full px-1.5 py-0.5 text-xs ${deadlineTone(task.deadline)}`}><CalendarDays className="w-3 h-3" />{formatDeadline(task.deadline)}</span>}
                      </div>
                      <span className="shrink-0 self-center text-slate-400 group-hover:text-blue-600 inline-flex items-center gap-1 text-xs font-medium">Start <ChevronRight className="w-4 h-4" /></span>
                    </button>
                  );
                })}
              </div>
              <p className="text-xs text-slate-500 mt-3 italic">Start with "Now" — only move to the next once that's done or parked.</p>
            </div>
          ) : (
            <div className="rounded-2xl border border-dashed border-slate-200 p-6 text-center">
              <p className="text-sm text-slate-500 mb-3">Nothing on today's list yet. Add tasks from the brain dump or capture above.</p>
              <Btn size="sm" variant="outline" onClick={() => onOpenTab('braindump')}><Brain className="w-4 h-4" /> Brain dump</Btn>
            </div>
          )}
        </div>
      )}

      {(today.filter(t => !t.pinned && !plan.find(p => p.taskId === t.id)).length > 0 || doneToday.length > 0) && (
        <div className="mt-2">
          {today.filter(t => !t.pinned && !plan.find(p => p.taskId === t.id)).length > 0 && (
            <div>
              <GroupLabel>Also on your list</GroupLabel>
              <div className="rounded-xl border border-slate-200 bg-white p-3.5">
                <p className="text-xs text-slate-400 mb-2">Not in today's order — pick one up only if you have room.</p>
                <div className="space-y-1">
                  {today.filter(t => !t.pinned && !plan.find(p => p.taskId === t.id)).map(t => (
                    <div key={t.id} className="group flex items-start gap-2 py-0.5">
                      <button onClick={() => updateTask(t.id, { done: true, status: 'done' })} className="mt-0.5 w-4 h-4 shrink-0 rounded border border-slate-300 grid place-items-center hover:border-blue-500" />
                      <button onClick={() => updateTask(t.id, { pinned: true })} className="flex-1 text-left text-sm leading-snug hover:text-blue-600">
                        {t.title}
                        {t.deadline && <span className={`ml-1.5 inline-flex items-center gap-0.5 rounded-full px-1.5 py-0.5 text-xs ${deadlineTone(t.deadline)}`}><CalendarDays className="w-2.5 h-2.5" />{formatDeadline(t.deadline)}</span>}
                      </button>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          )}

          {doneToday.length > 0 && (
            <div className="mt-3 space-y-1">
              {doneToday.map(t => (
                <div key={t.id} className="group flex items-center gap-2 py-0.5 text-sm text-slate-500">
                  <Check className="w-3.5 h-3.5 text-blue-600 shrink-0" />
                  <span className="flex-1 line-through truncate">{t.title}</span>
                  <button onClick={() => promoteToWin(t)} className="opacity-0 group-hover:opacity-100 text-xs text-blue-600 font-medium hover:underline inline-flex items-center gap-1 shrink-0">
                    <Trophy className="w-3 h-3" /> Promote to win
                  </button>
                </div>
              ))}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function JobsView() {
  const [jobs, setJobs] = useData(JOBS_KEY);
  const [tracks] = useData(TRACKS_KEY);
  const [showForm, setShowForm] = useState(false);
  const [showMore, setShowMore] = useState(false);
  const [form, setForm] = useState({ title: '', company: '', url: '', location: '', deadline: '', narrativeAngle: '', note: '', jdText: '', relatedTrackId: null });

  function add() {
    if (!form.title.trim()) return;
    setJobs([...jobs, { id: nextId(jobs), ...form, status: 'wishlist', createdAt: Date.now() }]);
    setForm({ title: '', company: '', url: '', location: '', deadline: '', narrativeAngle: '', note: '', jdText: '', relatedTrackId: null });
    setShowForm(false); setShowMore(false);
  }

  function move(job, dir) {
    const idx = JOB_COLS.findIndex(c => c.id === job.status);
    const next = JOB_COLS[idx + dir];
    if (next) setJobs(jobs.map(j => j.id === job.id ? { ...j, status: next.id } : j));
  }

  function remove(id) { setJobs(jobs.filter(j => j.id !== id)); }

  const grouped = JOB_COLS.map(col => ({ col, items: jobs.filter(j => j.status === col.id).sort((a, b) => {
    const da = daysUntil(a.deadline), db = daysUntil(b.deadline);
    if (da !== null && db !== null) return da - db;
    if (da !== null) return -1; if (db !== null) return 1;
    return b.id - a.id;
  }) }));
  const active = grouped.filter(g => g.items.length > 0 || g.col.id === 'wishlist');

  return (
    <div>
      <div className="flex items-start justify-between gap-4">
        <SectionHeading title="Jobs" sub="Roles and applications, soonest deadlines first." />
        <Btn onClick={() => setShowForm(s => !s)}><Plus className="w-4 h-4" /> Add role</Btn>
      </div>

      {showForm && (
        <div className="mb-5 rounded-xl border border-slate-200 bg-white p-4 space-y-3">
          <div className="grid gap-2 sm:grid-cols-2">
            <Input placeholder="Role title *" value={form.title} onChange={e => setForm({ ...form, title: e.target.value })} autoFocus />
            <Input placeholder="Company / org" value={form.company} onChange={e => setForm({ ...form, company: e.target.value })} />
            <Input placeholder="Link to posting" value={form.url} onChange={e => setForm({ ...form, url: e.target.value })} className="sm:col-span-2" />
          </div>
          {tracks.length > 0 && (
            <div>
              <p className="text-xs uppercase tracking-wide text-slate-400 mb-1.5">Link to a career track (optional)</p>
              <div className="flex flex-wrap gap-1.5">
                {tracks.map(t => (
                  <button key={t.id} type="button" onClick={() => setForm({ ...form, relatedTrackId: form.relatedTrackId === t.id ? null : t.id })}
                    className={`rounded-full border px-2.5 py-1 text-xs font-medium transition-colors ${form.relatedTrackId === t.id ? 'border-blue-300 bg-blue-50 text-blue-700' : 'border-slate-200 bg-white text-slate-500 hover:text-slate-700'}`}>
                    {t.name}
                  </button>
                ))}
              </div>
            </div>
          )}
          <button type="button" onClick={() => setShowMore(v => !v)} className="inline-flex items-center gap-1 text-xs text-slate-500 hover:text-slate-700">
            <ChevronDown className={`w-3.5 h-3.5 transition-transform ${showMore ? 'rotate-180' : ''}`} />
            {showMore ? 'Fewer options' : 'More options (deadline, narrative, JD)'}
          </button>
          {showMore && (
            <div className="grid gap-2 sm:grid-cols-2">
              <Input placeholder="Deadline (YYYY-MM-DD)" value={form.deadline} onChange={e => setForm({ ...form, deadline: e.target.value })} />
              <Input placeholder="Location" value={form.location} onChange={e => setForm({ ...form, location: e.target.value })} />
              <Input placeholder="Why you fit this role (narrative angle)" value={form.narrativeAngle} onChange={e => setForm({ ...form, narrativeAngle: e.target.value })} className="sm:col-span-2" />
              <Input placeholder="Note" value={form.note} onChange={e => setForm({ ...form, note: e.target.value })} className="sm:col-span-2" />
              <div className="sm:col-span-2">
                <p className="text-xs uppercase tracking-wide text-slate-400 mb-1">Job description</p>
                <Textarea placeholder="Paste the job posting here — used to shape your application and CV tailoring." value={form.jdText} onChange={e => setForm({ ...form, jdText: e.target.value })} rows={4} />
              </div>
            </div>
          )}
          <div className="flex gap-2 justify-end">
            <Btn variant="ghost" onClick={() => { setShowForm(false); setShowMore(false); }}>Cancel</Btn>
            <Btn onClick={add}>Save role</Btn>
          </div>
        </div>
      )}

      <div className="space-y-6">
        {active.map(({ col, items }) => (
          <div key={col.id}>
            <div className="flex items-center gap-2 mb-2.5">
              <span className="text-xs font-semibold uppercase tracking-wide text-slate-500">{col.label}</span>
              {items.length > 0 && <span className="text-xs text-slate-400 tabular-nums">({items.length})</span>}
            </div>
            <div className="space-y-2">
              {items.map(j => (
                <JobCard key={j.id} job={j} tracks={tracks}
                  onMove={dir => move(j, dir)}
                  onRemove={() => remove(j.id)}
                  onUpdate={patch => setJobs(jobs.map(x => x.id === j.id ? { ...x, ...patch } : x))} />
              ))}
              {items.length === 0 && col.id === 'wishlist' && (
                <div className="rounded-xl border border-dashed border-slate-200 px-4 py-6 text-center">
                  <p className="text-sm text-slate-500">No roles yet — add one above.</p>
                </div>
              )}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function ContactCard({ contact, tracks, onPatch, onRemove }) {
  const [draftOpen, setDraftOpen] = useState(false);
  const [draft, setDraft] = useState(contact.messageDraft || '');
  const idx = OUTREACH_COLS.findIndex(s => s.id === contact.status);
  const track = tracks.find(t => t.id === contact.relatedTrackId);
  const overdue = (() => {
    if (!contact.nextFollowUpDate) return false;
    const d = new Date(contact.nextFollowUpDate + 'T00:00:00');
    if (isNaN(d.getTime())) return false;
    const now = new Date(); now.setHours(0,0,0,0);
    return Math.round((d.getTime() - now.getTime()) / 86400000) < 0;
  })();

  const replied = contact.status === 'replied';
  const strength = contact.relationshipStrength || 'cold';
  const tone = replied ? 'border-emerald-200 bg-emerald-50/60' : overdue ? 'border-amber-300 bg-amber-50/50' : 'border-slate-200 bg-white';
  const strengthColors = { strong: 'bg-blue-100 text-blue-700', warm: 'bg-slate-200 text-slate-700', cold: 'bg-slate-100 text-slate-500' };

  return (
    <div className={`group rounded-lg border p-3 ${tone}`}>
      <div className="flex items-start justify-between gap-2">
        <div className="min-w-0">
          <div className="flex flex-wrap items-center gap-1.5">
            {contact.askType && <span className="inline-flex items-center gap-1 rounded-full bg-slate-700 text-slate-100 px-1.5 py-0.5 text-xs font-medium"><Send className="w-2.5 h-2.5" /> {ASK_LABEL[contact.askType] || contact.askType}</span>}
            <span className={`inline-flex items-center rounded-full px-1.5 py-0.5 text-xs font-medium ${strengthColors[strength]}`}>{strength}</span>
            {overdue && <span className="inline-flex items-center gap-1 rounded-full bg-amber-100 text-amber-700 px-1.5 py-0.5 text-xs font-semibold">overdue</span>}
          </div>
          <p className="text-sm font-medium leading-snug mt-1.5">{contact.who || 'Someone worth reaching'}</p>
          {contact.name && <p className="text-xs text-slate-500">{contact.name}</p>}
        </div>
        <button onClick={onRemove} className="opacity-0 group-hover:opacity-100 text-slate-400 hover:text-red-500 shrink-0"><Trash2 className="w-3.5 h-3.5" /></button>
      </div>

      <div className="flex flex-wrap items-center gap-1.5 mt-1.5">
        {track && <span className="text-xs rounded-full border border-blue-200 bg-blue-50 text-blue-700 px-2 py-0.5">{track.name}</span>}
        {(contact.targetOrg || contact.targetRole) && <span className="inline-flex items-center text-xs rounded-full bg-slate-100 text-slate-600 px-1.5 py-0.5">{[contact.targetRole, contact.targetOrg].filter(Boolean).join(' · ')}</span>}
        {contact.nextFollowUpDate && <span className={`inline-flex items-center gap-1 rounded-full px-1.5 py-0.5 text-xs font-medium ${overdue ? 'bg-amber-100 text-amber-700' : 'bg-slate-100 text-slate-500'}`}><CalendarDays className="w-2.5 h-2.5" />{formatDeadline(contact.nextFollowUpDate)}</span>}
      </div>

      {contact.why && <p className="text-xs text-slate-500 mt-1.5 leading-snug">{contact.why}</p>}

      {draftOpen && (
        <div className="mt-2">
          <Textarea value={draft} onChange={e => setDraft(e.target.value)} placeholder="Draft your outreach message…" rows={3} />
          <div className="flex items-center gap-2 mt-1.5">
            <Btn size="sm" onClick={() => { onPatch({ messageDraft: draft }); setDraftOpen(false); }}>Save draft</Btn>
            <button onClick={() => { setDraft(contact.messageDraft || ''); setDraftOpen(false); }} className="text-xs text-slate-500 hover:text-slate-700">cancel</button>
          </div>
        </div>
      )}

      <div className="flex items-center gap-1 mt-2.5">

function NetworkView() {

  function addContact() {
    if (!form.who.trim()) return;
    setContacts([...contacts, { id: nextId(contacts), ...form, createdAt: Date.now() }]);
    setForm({ who: '', name: '', targetOrg: '', targetRole: '', askType: 'soft', relationshipStrength: 'cold', why: '', nextFollowUpDate: '', relatedTrackId: null, status: 'to_contact', messageDraft: '' });
    setShowForm(false); setShowMore(false);
  }

  function patch(c, body) { setContacts(contacts.map(x => x.id === c.id ? { ...x, ...body } : x)); }
  function remove(id) { setContacts(contacts.filter(c => c.id !== id)); }

  const overdue = contacts.filter(c => {
    if (!c.nextFollowUpDate) return false;
    const d = new Date(c.nextFollowUpDate + 'T00:00:00');
    if (isNaN(d.getTime())) return false;
    const now = new Date(); now.setHours(0,0,0,0);
    return Math.round((d.getTime() - now.getTime()) / 86400000) < 0;
  });
  const notOverdue = contacts.filter(c => !overdue.includes(c));

  const byStatus = OUTREACH_COLS.map(col => ({ col, items: notOverdue.filter(c => c.status === col.id) })).filter(g => g.items.length > 0);

  return (

              <div className="flex flex-wrap gap-1.5">
                {['soft', 'advice', 'referral', 'reconnect', 'follow_up'].map(v => (
                  <button key={v} type="button" onClick={() => setForm({ ...form, askType: v })}
                    className={`rounded-full border px-2.5 py-1 text-xs font-medium transition-colors ${form.askType === v ? 'border-blue-300 bg-blue-50 text-blue-700' : 'border-slate-200 bg-white text-slate-500'}`}>
                    {ASK_LABEL[v] || v}
                  </button>
                ))}
              </div>
            </div>
            <div>
              <p className="text-xs uppercase tracking-wide text-slate-400 mb-1.5">Warmth</p>
              <div className="flex flex-wrap gap-1.5">
                {['cold', 'warm', 'strong'].map(v => (
                  <button key={v} type="button" onClick={() => setForm({ ...form, relationshipStrength: v })}
                    className={`rounded-full border px-2.5 py-1 text-xs font-medium transition-colors ${form.relationshipStrength === v ? 'border-blue-300 bg-blue-50 text-blue-700' : 'border-slate-200 bg-white text-slate-500'}`}>

// ─── BRAIN DUMP VIEW ──────────────────────────────────────────────────────────
function BrainDumpView({ onOpenTab }) {
  const [tasks, setTasks] = useData(TASKS_KEY);
  const [text, setText] = useState('');
  const [triage, setTriage] = useState({});
  const [sorting, setSorting] = useState(false);
  const [toast, setToast] = useState('');
  const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(''), 2000); };

  const inbox = tasks.filter(t => t.list === 'inbox' && !t.done);

  function add() {
    if (!text.trim()) return;
    const newTask = { id: nextId(tasks), title: text.trim(), list: 'inbox', done: false, pinned: false, steps: '[]', skipped: 0, createdAt: Date.now() };
    setTasks([...tasks, newTask]);
    setText('');
  }

  function remove(id) { setTasks(tasks.filter(t => t.id !== id)); }

  function sortAll() {
    setSorting(true);
    setTimeout(() => {
      const map = {};
      inbox.forEach(t => { map[t.id] = heuristicSort(t.title); });
      setTriage(map);
      setSorting(false);
      showToast('Sorted! Review each suggestion below.');
    }, 600);
  }

  function applyRoute(task, route) {
    let patch = {};
    if (route === 'today') patch = { list: 'today' };
    else if (route === 'task') patch = { list: 'today' };
    else if (route === 'job') {
      const jobs = loadLS(JOBS_KEY) || [];
      jobs.unshift({ id: nextId(jobs), title: task.title, status: 'wishlist', createdAt: Date.now() });
      saveLS(JOBS_KEY, jobs);
      patch = { done: true };
    } else if (route === 'learn') {
      const learn = loadLS(LEARN_KEY) || [];
      learn.unshift({ id: nextId(learn), title: task.title, learnStatus: 'open', done: false, active: false, createdAt: Date.now() });
      saveLS(LEARN_KEY, learn);
      patch = { done: true };
    } else if (route === 'network') {
      const contacts = loadLS(CONTACTS_KEY) || [];
      contacts.unshift({ id: nextId(contacts), who: task.title, status: 'to_contact', askType: 'advice', relationshipStrength: 'cold', createdAt: Date.now() });
      saveLS(CONTACTS_KEY, contacts);
      patch = { done: true };
    } else {
      patch = {};
    }
    setTasks(tasks.map(t => t.id === task.id ? { ...t, ...patch } : t).filter(t => !(t.id === task.id && patch.done)));
    setTriage(st => { const n = { ...st }; delete n[task.id]; return n; });
    showToast('Done!');
  }

  const ROUTE_LABEL = { today: 'Do today', task: 'Keep as task', job: 'File under Jobs', learn: 'File under Learn', network: 'File under Network', keep: 'Keep here' };

  return (
    <div>
      {toast && <div className="fixed top-4 left-1/2 -translate-x-1/2 z-50 bg-slate-800 text-white text-sm px-4 py-2 rounded-lg shadow-lg">{toast}</div>}
      <SectionHeading title="Brain dump" sub="Empty your head now. Sort it later." />
      <div className="flex gap-2 mb-3">
        <Input value={text} onChange={e => setText(e.target.value)} onKeyDown={e => { if (e.key === 'Enter') add(); }} placeholder="Type anything and hit Enter…" />
        <Btn onClick={add}><Plus className="w-4 h-4" /> Add</Btn>
      </div>
      {inbox.length > 0 && (
        <div className="mb-5">
          <Btn variant="outline" onClick={sortAll} disabled={sorting}>
            {sorting ? '⏳ Sorting…' : <><Wand2 className="w-4 h-4" /> Sort these for me</>}
          </Btn>
          <p className="text-xs text-slate-500 mt-1.5">I'll work out what each one is — a task for today, a job to track, or something to learn.</p>
        </div>
      )}
      {inbox.length === 0 ? (
        <div className="rounded-xl border border-dashed border-slate-200 px-4 py-8 text-center">
          <Sparkles className="w-8 h-8 text-slate-300 mx-auto mb-2" />
          <p className="text-sm text-slate-500">Empty head, clear mind. Add a thought above when one shows up.</p>
        </div>
      ) : (
        <div className="space-y-2">
          {inbox.map(t => {
            const tr = triage[t.id];
            return (
              <div key={t.id} className="group rounded-lg border border-slate-200 bg-white px-3 py-2.5">
                <div className="flex items-center gap-2">
                  <span className="flex-1 text-sm">{t.title}</span>
                  <div className="flex items-center gap-1 shrink-0">
                    {!tr && <Btn size="sm" variant="outline" onClick={() => applyRoute(t, 'today')}>Add to day</Btn>}
                    <button onClick={() => remove(t.id)} className="text-slate-400 hover:text-red-500 ml-0.5"><X className="w-4 h-4" /></button>
                  </div>
                </div>
                {tr && (
                  <div className="mt-2 pt-2 border-t border-slate-100 flex items-center gap-2 flex-wrap">
                    <span className="text-xs text-slate-500">{tr.reason}</span>
                    {tr.route !== 'keep' && (
                      <button onClick={() => applyRoute(t, tr.route)} className="text-xs font-medium text-blue-600 inline-flex items-center gap-1 rounded-md bg-blue-50 px-2 py-1 hover-elevate">
                        <ArrowUpRight className="w-3 h-3" /> {ROUTE_LABEL[tr.route] || 'File it'}
                      </button>
                    )}
                    {tr.route !== 'today' && <button onClick={() => applyRoute(t, 'today')} className="text-xs text-slate-500 hover:text-slate-700">or just do today</button>}
                    <button onClick={() => setTriage(s => { const n = { ...s }; delete n[t.id]; return n; })} className="text-xs text-slate-500 hover:text-slate-700">keep here</button>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ─── WINS VIEW ────────────────────────────────────────────────────────────────
function WinsView() {
  const [wins, setWins] = useData(WINS_KEY);
  const [text, setText] = useState('');
  const [category, setCategory] = useState('mindset');

  function add() {
    if (!text.trim()) return;
    setWins([{ id: nextId(wins), text: text.trim(), winCategory: category, createdAt: Date.now() }, ...wins]);
    setText('');
  }

  function remove(id) { setWins(wins.filter(w => w.id !== id)); }

  const weekAgo = Date.now() - 7 * 86400000;
  const thisWeek = wins.filter(w => w.createdAt >= weekAgo);
  const earlier = wins.filter(w => w.createdAt < weekAgo);

  function dayLabel(ts) { return new Date(ts).toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' }); }

  return (
    <div>
      <div className="flex items-start justify-between gap-4 mb-4">
        <SectionHeading title="Wins" sub="Small wins count — log them so you don't forget the progress you made." />
        {wins.length > 0 && (
          <div className="shrink-0 flex items-center gap-1.5 rounded-full bg-blue-50 text-blue-700 px-3 py-1.5 text-sm font-medium">
            <Trophy className="w-4 h-4" /> {wins.length} total
          </div>
        )}
      </div>

      <div className="flex flex-wrap gap-2 mb-3">
        <Input value={text} onChange={e => setText(e.target.value)} onKeyDown={e => { if (e.key === 'Enter') add(); }} placeholder="What went well? Anything counts…" className="flex-1 min-w-48" />
        <select value={category} onChange={e => setCategory(e.target.value)} className="h-10 rounded-lg border border-slate-200 bg-white px-3 text-sm text-slate-700 focus:outline-none focus:ring-2 focus:ring-blue-500/30">
          {WIN_CATEGORIES.map(c => <option key={c} value={c}>{WIN_CATEGORY_LABEL[c]}</option>)}
        </select>
        <Btn onClick={add}><Trophy className="w-4 h-4" /> Log win</Btn>
      </div>

      {wins.length === 0 ? (
        <div className="rounded-xl border border-dashed border-slate-200 px-4 py-8 text-center">
          <Trophy className="w-8 h-8 text-slate-300 mx-auto mb-2" />
          <p className="text-sm text-slate-500">No wins logged yet. Start with one small thing you did today.</p>
        </div>
      ) : (
        <div className="space-y-6">
          {thisWeek.length > 0 && (
            <div>
              <GroupLabel count={thisWeek.length}>This week</GroupLabel>
              <div className="space-y-2">
                {thisWeek.map(w => (
                  <div key={w.id} className="group flex items-center gap-3 rounded-lg border border-slate-200 bg-white px-3.5 py-3">
                    <Trophy className="w-4 h-4 text-blue-600 shrink-0" />
                    <span className="flex-1 text-sm">{w.text}</span>
                    {w.winCategory && <span className={`hidden sm:inline-flex shrink-0 text-xs rounded-full px-1.5 py-0.5 ${WIN_CATEGORY_SWATCH[w.winCategory] || 'bg-slate-100 text-slate-600'}`}>{WIN_CATEGORY_LABEL[w.winCategory] || w.winCategory}</span>}
                    <span className="text-xs text-slate-400 shrink-0">{dayLabel(w.createdAt)}</span>
                    <button onClick={() => remove(w.id)} className="opacity-0 group-hover:opacity-100 text-slate-400 hover:text-red-500"><X className="w-4 h-4" /></button>
                  </div>
                ))}
              </div>
            </div>
          )}
          {earlier.length > 0 && (
            <div>
              <GroupLabel count={earlier.length}>Earlier</GroupLabel>
              <div className="space-y-2">
                {earlier.map(w => (
                  <div key={w.id} className="group flex items-center gap-3 rounded-lg border border-slate-200 bg-white px-3.5 py-3">
                    <Trophy className="w-4 h-4 text-blue-600 shrink-0" />
                    <span className="flex-1 text-sm">{w.text}</span>
                    {w.winCategory && <span className={`hidden sm:inline-flex shrink-0 text-xs rounded-full px-1.5 py-0.5 ${WIN_CATEGORY_SWATCH[w.winCategory] || 'bg-slate-100 text-slate-600'}`}>{WIN_CATEGORY_LABEL[w.winCategory] || w.winCategory}</span>}
                    <span className="text-xs text-slate-400 shrink-0">{dayLabel(w.createdAt)}</span>
                    <button onClick={() => remove(w.id)} className="opacity-0 group-hover:opacity-100 text-slate-400 hover:text-red-500"><X className="w-4 h-4" /></button>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ─── STRATEGY VIEW ────────────────────────────────────────────────────────────
function StrategyView({ onOpenTab }) {
  const [tracks] = useData(TRACKS_KEY);
  const [jobs] = useData(JOBS_KEY);
  const [contacts] = useData(CONTACTS_KEY);
  const [learn] = useData(LEARN_KEY);
  const [wins] = useData(WINS_KEY);
  const [tasks] = useData(TASKS_KEY);

  const trackStats = tracks.map(t => {
    const trackJobs = jobs.filter(j => j.relatedTrackId === t.id);
    const trackContacts = contacts.filter(c => c.relatedTrackId === t.id);
    const trackLearn = learn.filter(l => l.relatedTrackId === t.id && !l.done);
    const warmContacts = trackContacts.filter(c => c.status === 'messaged' || c.status === 'replied' || c.relationshipStrength === 'warm' || c.relationshipStrength === 'strong');

    let bottleneck = 'none';
    let bottleneckLabel = '';
    let recommendedMove = '';

    if (trackJobs.length === 0) {
      bottleneck = 'direction';
      bottleneckLabel = 'No roles linked to this track yet.';
      recommendedMove = 'Add at least one target role to give this track a real destination.';
    } else if (warmContacts.length === 0) {
      bottleneck = 'warmth';
      bottleneckLabel = 'No warm contacts in this track.';
      recommendedMove = 'Add a contact who could speak to your fit for this lane.';
    } else if (trackLearn.length === 0) {
      bottleneck = 'proof';
      bottleneckLabel = 'No capability support in this track.';
      recommendedMove = 'Add a learning item that builds evidence for this lane.';
    } else {
      recommendedMove = 'Keep going — maintain momentum across jobs, contacts, and learning.';
    }

    return { ...t, counts: { jobs: trackJobs.length, contacts: trackContacts.length, learn: trackLearn.length, warm: warmContacts.length }, bottleneck, bottleneckLabel, recommendedMove };
  });

  const active = trackStats.filter(t => t.status === 'active');
  const watching = trackStats.filter(t => t.status !== 'active');

  const weekAgo = Date.now() - 7 * 86400000;
  const thisWeekWins = wins.filter(w => w.createdAt >= weekAgo).length;
  const openTasks = tasks.filter(t => !t.done && t.list === 'today').length;

  return (
    <div>
      <h1 className="text-xl font-bold tracking-tight">Strategy</h1>
      <p className="text-sm text-slate-500 mt-1 mb-5">Active role types and what each needs.</p>

      <div className="mb-6 grid grid-cols-3 gap-3">
        <div className="rounded-xl border border-slate-200 bg-white p-3 text-center">
          <p className="text-2xl font-bold text-blue-600">{jobs.length}</p>
          <p className="text-xs text-slate-500 mt-1">Total roles</p>
        </div>
        <div className="rounded-xl border border-slate-200 bg-white p-3 text-center">
          <p className="text-2xl font-bold text-emerald-600">{wins.length}</p>
          <p className="text-xs text-slate-500 mt-1">Wins logged</p>
        </div>
        <div className="rounded-xl border border-slate-200 bg-white p-3 text-center">
          <p className="text-2xl font-bold text-violet-600">{thisWeekWins}</p>
          <p className="text-xs text-slate-500 mt-1">This week</p>
        </div>
      </div>

      {active.length > 0 && (
        <>
          <GroupLabel>Active role types</GroupLabel>
          <div className="grid gap-3 sm:grid-cols-2 mt-2 mb-6">
            {active.map(t => (
              <div key={t.id} className="rounded-xl border border-slate-200 bg-white p-4">
                <div className="flex items-start justify-between gap-2">
                  <div className="min-w-0">
                    <h3 className="font-semibold text-sm leading-snug">{t.name}</h3>
                    {t.whyItFits && <p className="text-xs text-slate-500 mt-0.5 leading-snug">{t.whyItFits}</p>}
                  </div>
                  <span className="text-xs text-slate-400 shrink-0 mt-0.5">{t.counts.jobs} role{t.counts.jobs !== 1 ? 's' : ''}</span>
                </div>
                <div className="flex flex-wrap items-center gap-2 mt-2">
                  <span className="inline-flex items-center gap-1 text-xs rounded-full bg-slate-100 text-slate-600 px-2 py-0.5"><Briefcase className="w-3 h-3" /> {t.counts.jobs} jobs</span>
                  <span className="inline-flex items-center gap-1 text-xs rounded-full bg-slate-100 text-slate-600 px-2 py-0.5"><Users className="w-3 h-3" /> {t.counts.contacts} contacts</span>
                  <span className="inline-flex items-center gap-1 text-xs rounded-full bg-slate-100 text-slate-600 px-2 py-0.5"><BookOpen className="w-3 h-3" /> {t.counts.learn} learn</span>
                </div>
                {t.bottleneck !== 'none' ? (
                  <div className="rounded-lg bg-amber-50 border border-amber-200 px-3 py-2 mt-2.5">
                    <p className="text-xs text-amber-800 leading-snug">{t.bottleneckLabel}</p>
                    <p className="text-xs text-blue-600 mt-1.5 flex items-start gap-1"><ArrowUpRight className="w-3.5 h-3.5 shrink-0 mt-px" />{t.recommendedMove}</p>
                  </div>
                ) : (
                  <p className="text-xs text-blue-600 mt-2.5 flex items-start gap-1"><ArrowUpRight className="w-3.5 h-3.5 shrink-0 mt-px" />{t.recommendedMove}</p>
                )}
              </div>
            ))}
          </div>
        </>
      )}

      {watching.length > 0 && (
        <>
          <GroupLabel>Watching</GroupLabel>
          <div className="grid gap-3 sm:grid-cols-2 mt-2 mb-6">
            {watching.map(t => (
              <div key={t.id} className="rounded-xl border border-slate-200 bg-white p-4 opacity-75">
                <div className="flex items-start justify-between gap-2">
                  <h3 className="font-semibold text-sm leading-snug">{t.name}</h3>
                  <span className="text-xs text-slate-400 shrink-0 mt-0.5 rounded-full bg-slate-100 px-1.5 py-0.5">watch</span>
                </div>
                {t.whyItFits && <p className="text-xs text-slate-500 mt-0.5">{t.whyItFits}</p>}
                <p className="text-xs text-blue-600 mt-2.5 flex items-start gap-1"><ArrowUpRight className="w-3.5 h-3.5 shrink-0 mt-px" />{t.recommendedMove}</p>
              </div>
            ))}
          </div>
        </>
      )}

      <div className="flex flex-wrap gap-2 mt-4">
        <Btn size="sm" variant="outline" onClick={() => onOpenTab('jobs')}><Briefcase className="w-4 h-4" /> Jobs</Btn>
        <Btn size="sm" variant="outline" onClick={() => onOpenTab('network')}><Users className="w-4 h-4" /> Network</Btn>
        <Btn size="sm" variant="outline" onClick={() => onOpenTab('learn')}><GraduationCap className="w-4 h-4" /> Learn</Btn>
        <Btn size="sm" variant="outline" onClick={() => onOpenTab('today')}><Target className="w-4 h-4" /> Today</Btn>
      </div>
    </div>
  );
}

// ─── TASKS FROM BRAIN DUMP helper (create tasks for today) ───────────────────
function QuickAddTask({ onAdd }) {
  const [text, setText] = useState('');
  function submit() {
    if (!text.trim()) return;
    onAdd(text.trim());
    setText('');
  }
  return (
    <div className="flex gap-2 mb-4">
      <Input value={text} onChange={e => setText(e.target.value)} onKeyDown={e => { if (e.key === 'Enter') submit(); }} placeholder="Add a task for today…" />
      <Btn variant="outline" onClick={submit}><Plus className="w-4 h-4" /> Add</Btn>
    </div>
  );
}

// ─── MORE MENU (Wins + Strategy) ─────────────────────────────────────────────
function MoreMenu({ onSelect, open, setOpen }) {
  const ref = useRef(null);
  useEffect(() => {
    function handle(e) { if (ref.current && !ref.current.contains(e.target)) setOpen(false); }
    if (open) document.addEventListener('mousedown', handle);
    return () => document.removeEventListener('mousedown', handle);
  }, [open, setOpen]);

  return (
    <div ref={ref} className="relative">
      <button onClick={() => setOpen(o => !o)} className={`flex flex-col items-center gap-0.5 px-3 py-2 text-xs font-medium ${open ? 'text-blue-600' : 'text-slate-500 hover:text-slate-700'}`}>
        <MoreHorizontal className="w-5 h-5" />
        <span>More</span>
      </button>
      {open && (
        <div className="absolute bottom-full right-0 mb-2 w-40 rounded-xl border border-slate-200 bg-white shadow-lg overflow-hidden z-50">
          <button onClick={() => { onSelect('wins'); setOpen(false); }} className="w-full flex items-center gap-2.5 px-4 py-3 text-sm text-slate-700 hover:bg-slate-50">
            <Trophy className="w-4 h-4 text-blue-600" /> Wins
          </button>
          <button onClick={() => { onSelect('strategy'); setOpen(false); }} className="w-full flex items-center gap-2.5 px-4 py-3 text-sm text-slate-700 hover:bg-slate-50">
            <Compass className="w-4 h-4 text-blue-600" /> Strategy
          </button>
        </div>
      )}
    </div>
  );
}

// ─── ROOT APP ─────────────────────────────────────────────────────────────────
const TABS = [
  { id: 'today', label: 'Today', Icon: Sun },
  { id: 'jobs', label: 'Jobs', Icon: Briefcase },
  { id: 'network', label: 'Network', Icon: Users },
  { id: 'learn', label: 'Learn', Icon: BookOpen },
  { id: 'braindump', label: 'Dump', Icon: Brain },
];

function App() {
  const [tab, setTab] = useState('today');
  const [moreOpen, setMoreOpen] = useState(false);

  function openTab(t) { setTab(t); setMoreOpen(false); }

  const isMore = tab === 'wins' || tab === 'strategy';

  return (
    <div className="min-h-screen bg-slate-50 flex flex-col">
      {/* Header */}
      <header className="sticky top-0 z-40 bg-white border-b border-slate-100 px-4 py-3 flex items-center justify-between">
        <div className="flex items-center gap-2">
          <div className="w-7 h-7 rounded-lg bg-blue-600 flex items-center justify-center">
            <Target className="w-4 h-4 text-white" />
          </div>
          <span className="font-bold text-slate-800 text-base tracking-tight">Anchor</span>
        </div>
        <span className="text-xs text-slate-400">{new Date().toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' })}</span>
      </header>

      {/* Main content */}
      <main className="flex-1 overflow-auto pb-24">
        <div className="max-w-2xl mx-auto px-4 py-5">
          {tab === 'today' && <TodayView onOpenTab={openTab} />}
          {tab === 'jobs' && <JobsView />}
          {tab === 'network' && <NetworkView />}
          {tab === 'learn' && <LearnView />}
          {tab === 'braindump' && <BrainDumpView onOpenTab={openTab} />}
          {tab === 'wins' && <WinsView />}
          {tab === 'strategy' && <StrategyView onOpenTab={openTab} />}
        </div>
      </main>

      {/* Bottom tab bar */}
      <nav className="fixed bottom-0 left-0 right-0 z-40 bg-white border-t border-slate-200 safe-area-pb">
        <div className="max-w-2xl mx-auto flex items-center justify-around px-1">
          {TABS.map(({ id, label, Icon }) => {
            const active = tab === id;
            return (
              <button key={id} onClick={() => openTab(id)} className={`flex flex-col items-center gap-0.5 px-3 py-2 text-xs font-medium transition-colors ${active ? 'text-blue-600' : 'text-slate-500 hover:text-slate-700'}`}>
                <Icon className={`w-5 h-5 ${active ? 'text-blue-600' : ''}`} />
                <span>{label}</span>
                {active && <span className="absolute bottom-0 w-5 h-0.5 bg-blue-600 rounded-t-full" />}
              </button>
            );
          })}
          <MoreMenu onSelect={openTab} open={moreOpen} setOpen={setMoreOpen} />
        </div>
      </nav>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
